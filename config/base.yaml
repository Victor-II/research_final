name: "baseline"

model:
  name: "google/flan-t5-small"
  learning_rate: 0.0003
  weight_decay: 0.01
  max_length: 256
  batch_size: 8
  val_batch_size: 32
  warmup_ratio: 0.06
  lr_scheduler: "cosine"
  max_new_tokens: 64
  label_smoothing: 0.05

generation:
  num_beams: 1
  repetition_penalty: 1.0
  length_penalty: 1.0
  do_sample: false
  temperature: 1.0
  num_return_sequences: 1
  vote_threshold: 1

trainer:
  from_checkpoint: null
  early_stopping_patience: 0
  max_epochs: 15
  precision: "bf16-mixed"
  accumulate_grad_batches: 4
  gradient_clip_val: 1.0
  log_every_n_steps: 1
  limit_train_batches: 1.0
  num_sanity_val_steps: 0
  reload_dataloaders_every_n_epochs: 1
  deterministic: true
  num_workers: 11

data:
  train_file: "downloads/ABSADatasets/datasets/aste_datasets/400.SemEval/402.Restaurant14/train.txt"
  filter_implicit: false
  infer_implicit: false
  tasks_partition:
    aspect: 0.3
    polarity: 0.3
    sentiment: 0.3
    full: 0.1
  shuffle_tasks: false
  natural_language_fraction: 0.0
  curriculum: null
  # curriculum:
  #   - epoch: 0
  #     tasks_partition: {aspect: 0.33, sentiment: 0.33, polarity: 0.34}
  #   - epoch: 10
  #     tasks_partition: {aspect+sentiment: 0.33, aspect+polarity: 0.33, sentiment+polarity: 0.34}
  #   - epoch: 20
  #     tasks_partition: {full: 1.0}
  syntax_enrichment: null  # null, "dep-tree", "dep-compact", "dep-inline", "pos-inline"
  augmentation:
    duplicate: null
    mask_aspects: null
    # mask_aspects:
    #   fraction: 0.5
    #   replace: false
    #   mask_target: false  # true = sentinel in target, false = keep real aspect in target
    nlpaug: null
    llm_paraphrase: null
    # llm_paraphrase:
    #   data: "path/to/paraphrased.json"
    #   fraction: 0.3
    #   replace: true
    # nlpaug:
    #   method: synonym  # synonym | random_insert | random_swap | random_delete | contextual | spelling | antonym | split
    #   fraction: 0.5
    #   aug_p: 0.1
    #   replace: false
    #   protect_aspects: true  # false = full augmentation (aspects can change)
    #   model: "bert-base-uncased"  # only for contextual method

eval:
  val_split: 0  # fraction of training data to use as validation (0 = use eval.data file instead)
  data: "downloads/ABSADatasets/datasets/aste_datasets/400.SemEval/402.Restaurant14/dev.txt"
  tasks: ["aspect", "sentiment", "polarity"]
  scopes:
    - keys: ["aspect", "sentiment", "polarity"]
      metrics: [micro_f1]
    - keys: ["aspect"]
      metrics: [micro_f1, soft_f1]
      soft_threshold: 0.8
      soft_model: "all-MiniLM-L6-v2"
    - keys: ["sentiment"]
      metrics: [micro_f1]
    - keys: ["polarity"]
      metrics: [micro_f1, macro_f1]

test:
  from_checkpoint: null
  scopes:
    - keys: ["aspect", "sentiment", "polarity"]
      metrics: [micro_f1]
    - keys: ["aspect"]
      metrics: [micro_f1, soft_f1]
      soft_threshold: 0.8
      soft_model: "all-MiniLM-L6-v2"
    - keys: ["sentiment"]
      metrics: [micro_f1]
    - keys: ["polarity"]
      metrics: [micro_f1, macro_f1]
  datasets:
    - data: "downloads/ABSADatasets/datasets/aste_datasets/400.SemEval/402.Restaurant14/test.txt"
      tasks: ["aspect", "sentiment", "polarity"]
    - data: "downloads/ABSADatasets/datasets/aste_datasets/400.SemEval/402.Restaurant14/dev.txt"
      tasks: ["aspect", "sentiment", "polarity"]
  filter_implicit: false
  eval_implicit_split: false

seed: 42
