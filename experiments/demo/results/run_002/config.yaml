model:
  name: "google/flan-t5-small"
  learning_rate: 0.0003
  max_length: 256
  batch_size: 8
  val_batch_size: 32
  warmup_ratio: 0.06
  max_new_tokens: 64

trainer:
  from_checkpoint: null
  max_epochs: 4
  precision: "bf16-mixed"
  accumulate_grad_batches: 4
  log_every_n_steps: 1
  limit_train_batches: 1.0
  num_sanity_val_steps: 0
  reload_dataloaders_every_n_epochs: 1
  deterministic: true

data:
  train_file: "downloads/ABSADatasets/datasets/aste_datasets/400.SemEval/402.Restaurant14/train.txt"
  tasks_partition:
    aspect: 0.3
    polarity: 0.3
    sentiment: 0.3
    full: 0.1

eval:
  data: "downloads/ABSADatasets/datasets/aste_datasets/400.SemEval/402.Restaurant14/dev.txt"
  scopes:
    - keys: ["aspect", "sentiment", "polarity"]
      metrics: [micro_f1]
    - keys: ["aspect"]
      metrics: [micro_f1]
    - keys: ["sentiment"]
      metrics: [micro_f1]
    - keys: ["polarity"]
      metrics: [micro_f1, macro_f1]

test:
  from_checkpoint: null
  scopes:
    - keys: ["aspect", "sentiment", "polarity"]
      metrics: [micro_f1]
    - keys: ["aspect"]
      metrics: [micro_f1]
    - keys: ["sentiment"]
      metrics: [micro_f1]
    - keys: ["polarity"]
      metrics: [micro_f1, macro_f1]
  datasets:
    - data: "downloads/ABSADatasets/datasets/aste_datasets/400.SemEval/402.Restaurant14/test.txt"
    - data: "downloads/ABSADatasets/datasets/aste_datasets/400.SemEval/402.Restaurant14/dev.txt"
      scopes:
        - keys: ["aspect", "sentiment", "polarity"]
          metrics: [micro_f1]
        - keys: ["polarity"]
          metrics: [macro_f1]

seed: 42
