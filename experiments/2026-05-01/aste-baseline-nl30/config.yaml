name: aste-baseline-nl30
model:
  name: google/flan-t5-base
  learning_rate: 0.0003
  weight_decay: 0.01
  max_length: 256
  batch_size: 8
  val_batch_size: 32
  warmup_ratio: 0.06
  lr_scheduler: cosine
  max_new_tokens: 64
  label_smoothing: 0.05
generation:
  num_beams: 1
  repetition_penalty: 1.0
  length_penalty: 1.0
trainer:
  from_checkpoint: null
  max_epochs: 20
  precision: bf16-mixed
  accumulate_grad_batches: 4
  gradient_clip_val: 1.0
  log_every_n_steps: 1
  limit_train_batches: 1.0
  num_sanity_val_steps: 0
  reload_dataloaders_every_n_epochs: 1
  deterministic: true
data:
  train_file:
  - downloads/ABSADatasets/datasets/aste_datasets/400.SemEval/402.Restaurant14/train.txt
  - downloads/ABSADatasets/datasets/aste_datasets/400.SemEval/403.Restaurant15/train.txt
  - downloads/ABSADatasets/datasets/aste_datasets/400.SemEval/404.Restaurant16/train.txt
  filter_implicit: false
  tasks_partition:
    full: 1.0
  shuffle_tasks: false
  natural_language_fraction: 0.3
  augmentation:
    duplicate: null
    mask_aspects: null
    nlpaug: null
eval:
  val_split: 0
  data: downloads/ABSADatasets/datasets/aste_datasets/400.SemEval/402.Restaurant14/dev.txt
  tasks:
  - aspect
  - sentiment
  - polarity
  scopes:
  - keys:
    - aspect
    - sentiment
    - polarity
    metrics:
    - micro_f1
test:
  from_checkpoint: null
  scopes:
  - keys:
    - aspect
    - sentiment
    - polarity
    metrics:
    - micro_f1
  datasets:
  - data: downloads/ABSADatasets/datasets/aste_datasets/400.SemEval/402.Restaurant14/test.txt
    tasks: &id001
    - aspect
    - sentiment
    - polarity
  - data: downloads/ABSADatasets/datasets/aste_datasets/400.SemEval/401.Laptop14/test.txt
    tasks: *id001
  filter_implicit: false
  eval_implicit_split: false
seed: 42
